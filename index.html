<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전투력 랭킹</title>
    <style>
        /* 🎨 기본 라이트모드 변수 */
        :root {
            --bg-body: #f8f9fa;
            --bg-panel: #ffffff;
            --border-color: #e9ecef;
            --text-main: #333333;
            --text-sub: #495057;
            --text-muted: #868e96;
            --text-title: #222222;
            --text-name: #212529;
            --table-th-bg: #f8f9fa;
            --table-border: #f1f3f5;
            --omega-bg: rgba(181, 16, 0, 0.15); /* 👈 색상 조금 더 밝게 조정 */
        }

        /* 🌙 다크모드 변수 세팅 */
        [data-theme="dark"] {
            --bg-body: #141517;
            --bg-panel: #1a1b1e;
            --border-color: #2c2e33;
            --text-main: #c1c2c5;
            --text-sub: #909296;
            --text-muted: #5c5f66;
            --text-title: #ffffff;
            --text-name: #ffe066;
            --table-th-bg: #25262b;
            --table-border: #2c2e33;
            --omega-bg: rgba(220, 50, 30, 0.3); /* 👈 다크모드도 더 밝게 강조 */
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 🔝 상단 타이틀 부 및 버튼 */
        .top-control-bar { width: 100%; max-width: 1400px; display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .btn-toggle-theme { display: inline-flex; align-items: center; justify-content: center; background: var(--bg-panel); color: var(--text-sub); font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 50px; border: 1px solid var(--border-color); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04); cursor: pointer; }
        .header-area { text-align: center; margin-bottom: 25px; width: 100%; max-width: 1400px; }
        .header-gif { width: 260px; max-width: 100%; height: auto; margin-bottom: -10px; }
        h1 { font-size: 28px; font-weight: 700; margin: 10px 0 0 0; color: var(--text-title); }

        /* 🏛️ 시상대 및 리더보드 */
        .main-container { display: flex; flex-direction: row; align-items: stretch; gap: 30px; max-width: 1400px; width: 100%; box-sizing: border-box; }
        .podium-wrapper { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 16px; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 20px; padding: 25px 20px; min-height: 580px; }
        .podium-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 18px; padding: 15px 10px 20px 10px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; overflow: hidden; }
        .rank-panel { flex: 1; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px 24px; width: 100%; }
        
        /* 👑 오메가 티어 행 강조 */
        .omega-row { background-color: var(--omega-bg) !important; }
        .tier-omega-text { color: #b51000; font-weight: 800; }
        
        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: var(--table-th-bg); color: var(--text-sub); font-size: 13px; padding: 12px; border-bottom: 2px solid var(--table-border); }
        td { padding: 14px 12px; font-size: 14px; color: var(--text-sub); border-bottom: 1px solid var(--table-border); }

        /* ... 이전 스타일 유지 ... */
        .shine-effect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
        .shine-effect::after { content: ""; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%; background: linear-gradient(135deg, rgba(255, 215, 0, 0) 0%, rgba(255, 215, 0, 0) 40%, rgba(255, 235, 120, 0.85) 50%, rgba(255, 215, 0, 0) 60%, rgba(255, 215, 0, 0) 100%); animation: diagonalShine 4s ease-in-out infinite; }
        @keyframes diagonalShine { 0% { transform: translate(-30%, -30%); } 18% { transform: translate(30%, 30%); } 100% { transform: translate(30%, 30%); } }
        
        .p-1st { flex: 1.3; height: 520px; border-top: 6px solid #ffd700; background: linear-gradient(180deg, rgba(255,251,235,0.4) 0%, var(--bg-panel) 40%); }
        .p-2nd { flex: 1; height: 430px; border-top: 6px solid #c0c0c0; background: linear-gradient(180deg, rgba(248,249,250,0.1) 0%, var(--bg-panel) 40%); }
        .p-3rd { flex: 0.9; height: 380px; border-top: 6px solid #cd7f32; background: linear-gradient(180deg, rgba(255,250,245,0.1) 0%, var(--bg-panel) 40%); }
        .trophy-img { width: auto; max-width: 100%; margin-bottom: 12px; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.12)); animation: floatAnimation 3s ease-in-out infinite; }
        @keyframes floatAnimation { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }

        .btn-view-stats { background: #eef2ff; color: #4c6ef5; border: none; padding: 6px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; }
        [data-theme="dark"] .btn-view-stats { background: #25262b; color: #748ffc; }
    </style>
</head>
<body>
    <div class="top-control-bar"><button class="btn-toggle-theme" id="theme-toggle-btn" onclick="toggleTheme()">🌙 다크모드</button></div>
    <div class="header-area">
        <img src="https://mblogthumb-phinf.pstatic.net/20140921_272/saiyuki1357_1411272744482CFU6N_GIF/%B0%AD%C7%F53.gif?type=w420" alt="강화 연출" class="header-gif">
        <h1>클래식 서버 전투력 랭킹</h1>
    </div>

    <div class="main-container" id="main-layout">
        <div class="podium-wrapper">
            <div class="podium-card p-2nd" id="podium-2nd"></div>
            <div class="podium-card p-1st" id="podium-1st"></div>
            <div class="podium-card p-3rd" id="podium-3rd"></div>
        </div>

        <div class="rank-panel">
            <div class="rank-header-line">
                <h2 class="card-title">📊 실시간 리더보드</h2>
                <div class="control-area">
                    <input type="text" id="search-bar" class="search-input" placeholder="🔍 닉네임 검색" oninput="renderRanking()">
                    <button class="btn-apply-ranking" onclick="openNoticeModal()">🏆 랭킹 등재 신청</button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 10%;">순위</th>
                        <th style="width: 15%;">티어</th>
                        <th style="width: 15%;">레벨</th>
                        <th>닉네임</th>
                        <th style="text-align: right; width: 20%;">전투력</th>
                        <th style="text-align: center; width: 15%;">스탯</th>
                    </tr>
                </thead>
                <tbody id="ranking-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const TROPHY_1ST = "https://raw.githubusercontent.com/MF-Rank/Ranking/main/images/S1-1st.png";
        const TROPHY_2ND = "https://raw.githubusercontent.com/MF-Rank/Ranking/main/images/S1-2nd.png";
        const TROPHY_3RD = "https://raw.githubusercontent.com/MF-Rank/Ranking/main/images/S1-3rd.png";
        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1VxePbQvytvB0bkVxDMxukX9VqB15yemmyqNeJ9Ju5eg/edit?gid=1742833314#gid=1742833314";

        let rankingData = [];

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
            updateThemeButtonText(targetTheme);
        }

        function updateThemeButtonText(theme) {
            const btn = document.getElementById('theme-toggle-btn');
            if (btn) btn.innerText = theme === 'dark' ? '☀️ 라이트모드' : '🌙 다크모드';
        }

        (function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();

        async function fetchRankingData() {
            const jsonUrl = `https://docs.google.com/spreadsheets/d/1VxePbQvytvB0bkVxDMxukX9VqB15yemmyqNeJ9Ju5eg/gviz/tq?tqx=out:json&gid=1742833314`;
            const response = await fetch(jsonUrl);
            const text = await response.text();
            const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
            
            rankingData = json.table.rows.map(row => {
                const c = row.c;
                return {
                    level: parseInt((c[1]?.f || c[1]?.v || 0).toString().replace(/[^0-9]/g, "")),
                    name: (c[2]?.v || "").toString().trim(),
                    power: parseInt((c[3]?.f || c[3]?.v || 0).toString().replace(/[^0-9]/g, "")),
                    img: (c[4]?.v || "").toString().trim().replace(/.*\/d\//, "https://drive.google.com/thumbnail?id=").replace(/\/view.*/, "&sz=w1000"),
                    isApproved: (c[5]?.v || "").toString().includes('승인'),
                    isPrivate: (c[6]?.v || "").toString() === '비공개'
                };
            }).filter(u => u.isApproved).sort((a, b) => b.power - a.power);
            renderRanking();
        }

        function renderRanking() {
            const tbody = document.getElementById('ranking-list');
            tbody.innerHTML = '';
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();

            rankingData.forEach((user, index) => {
                if (searchTerm && !user.name.toLowerCase().includes(searchTerm)) return;

                const rank = index + 1;
                const isOmega = rank <= 5;
                const tr = document.createElement('tr');
                if (isOmega) tr.className = 'omega-row';

                tr.innerHTML = `
                    <td><span class="badge ${rank <= 3 ? 'top-'+rank : 'top-normal'}">${rank}</span></td>
                    <td class="tier-omega-text">${isOmega ? 'Ω' : '-'}</td>
                    <td class="level-text">Lv.${user.level}</td>
                    <td style="font-weight: 600; color: var(--text-name);">${user.name}</td>
                    <td class="power-text" style="text-align: right;">${user.power.toLocaleString()}</td>
                    <td style="text-align: center;"><button class="btn-view-stats" ${user.isPrivate || !user.img ? 'disabled':''} onclick="openModal('${user.name}', '${user.level}', '${user.power}', '${user.img}')">${user.isPrivate ? '🔒' : '📷'}</button></td>
                `;
                tbody.appendChild(tr);
            });
            updatePodiumSlots();
        }

        function updatePodiumSlots() {
            ['podium-1st', 'podium-2nd', 'podium-3rd'].forEach((id, i) => {
                const el = document.getElementById(id);
                if (!rankingData[i]) { el.innerHTML = `<div class="podium-empty">${i+1}등 공석</div>`; return; }
                el.innerHTML = `${i===0 ? '<div class="shine-effect"></div>' : ''}
                    <img src="${['', TROPHY_1ST, TROPHY_2ND, TROPHY_3RD][i+1]}" class="trophy-img">
                    <div class="podium-name">${rankingData[i].name}</div>
                    <div class="podium-level">Lv.${rankingData[i].level}</div>
                    <div class="podium-power">${rankingData[i].power.toLocaleString()}</div>`;
            });
        }
        
        window.onload = fetchRankingData;
    </script>
</body>
</html>
