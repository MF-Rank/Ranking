<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전투력 랭킹</title>
    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-panel: #ffffff;
            --border-color: #e9ecef;
            --text-main: #333333;
            --text-sub: #495057;
            --text-muted: #868e96;
            --text-title: #222222;
            --text-name: #212529;
            --table-th-bg: #f8f9fa;
            --table-border: #f1f3f5;
            --omega-bg: rgba(181, 16, 0, 0.15);
        }

        [data-theme="dark"] {
            --bg-body: #141517;
            --bg-panel: #1a1b1e;
            --border-color: #2c2e33;
            --text-main: #c1c2c5;
            --text-sub: #909296;
            --text-muted: #5c5f66;
            --text-title: #ffffff;
            --text-name: #ffe066;
            --table-th-bg: #25262b;
            --table-border: #2c2e33;
            --omega-bg: rgba(220, 50, 30, 0.35);
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; transition: background-color 0.3s, color 0.3s; }
        
        /* 🔝 상단 및 시상대 레이아웃 */
        .top-control-bar { width: 100%; max-width: 1400px; display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .btn-toggle-theme { background: var(--bg-panel); color: var(--text-sub); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 13px; }
        .header-area { text-align: center; margin-bottom: 25px; width: 100%; max-width: 1400px; }
        .header-gif { width: 260px; max-width: 100%; height: auto; }
        .main-container { display: flex; flex-direction: row; align-items: stretch; gap: 30px; max-width: 1400px; width: 100%; }
        
        .podium-wrapper { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 16px; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 20px; padding: 25px; min-height: 580px; }
        .podium-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 18px; padding: 15px; text-align: center; flex: 1; position: relative; overflow: hidden; }
        .trophy-img { height: 150px; margin-bottom: 12px; }
        .p-1st { flex: 1.3; border-top: 6px solid #ffd700; }
        .p-2nd { border-top: 6px solid #c0c0c0; }
        .p-3rd { border-top: 6px solid #cd7f32; }
        
        /* 👑 오메가 전용 */
        .omega-row { background-color: var(--omega-bg); }
        .tier-omega-text { color: #b51000; font-weight: 800; }
        
        /* 테이블 */
        .rank-panel { flex: 1; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; border-bottom: 2px solid var(--table-border); color: var(--text-sub); }
        td { padding: 14px 12px; border-bottom: 1px solid var(--table-border); }
        
        /* Shine 애니메이션 */
        .shine-effect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
        .shine-effect::after { content: ""; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%; background: linear-gradient(135deg, rgba(255,215,0,0) 0%, rgba(255,235,120,0.85) 50%, rgba(255,215,0,0) 100%); animation: diagonalShine 4s ease-in-out infinite; }
        @keyframes diagonalShine { 0% { transform: translate(-30%, -30%); } 18% { transform: translate(30%, 30%); } 100% { transform: translate(30%, 30%); } }
        
        /* 반응형 */
        @media (max-width: 991px) { .main-container { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="top-control-bar"><button class="btn-toggle-theme" id="theme-toggle-btn" onclick="toggleTheme()">🌙 다크모드</button></div>
    <div class="header-area">
        <h1>클래식 서버 전투력 랭킹</h1>
    </div>

    <div class="main-container" id="main-layout">
        <div class="podium-wrapper">
            <div class="podium-card p-2nd" id="podium-2nd"></div>
            <div class="podium-card p-1st" id="podium-1st"></div>
            <div class="podium-card p-3rd" id="podium-3rd"></div>
        </div>

        <div class="rank-panel">
            <table>
                <thead>
                    <tr><th>순위</th><th>티어</th><th>레벨</th><th>닉네임</th><th style="text-align: right;">전투력</th><th style="text-align: center;">스탯</th></tr>
                </thead>
                <tbody id="ranking-list"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        // 생략된 부분은 이전과 동일하게 유지하되 renderRanking 내 버튼을 아래와 같이 수정
        function renderRanking() {
            const tbody = document.getElementById('ranking-list');
            tbody.innerHTML = '';
            rankingData.forEach((user, index) => {
                const rank = index + 1;
                const isOmega = rank <= 5;
                const tr = document.createElement('tr');
                if (isOmega) tr.className = 'omega-row';
                tr.innerHTML = `
                    <td>${rank}</td>
                    <td class="tier-omega-text">${isOmega ? 'Ω' : '-'}</td>
                    <td>Lv.${user.level}</td>
                    <td style="color:var(--text-name)">${user.name}</td>
                    <td style="text-align:right">${user.power.toLocaleString()}</td>
                    <td style="text-align:center"><button class="btn-view-stats" onclick="openModal('${user.name}', ${user.level}, ${user.power}, '${user.img}')">📷</button></td>
                `;
                tbody.appendChild(tr);
            });
        }
        // ...나머지 fetchRankingData 등 함수 유지
    </script>
</body>
</html>
