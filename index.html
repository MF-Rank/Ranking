<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전투력 랭킹</title>
    <style>
        :root {
            --bg-body: #f8f9fa; --bg-panel: #ffffff; --border-color: #e9ecef;
            --text-main: #333333; --text-sub: #495057; --text-muted: #868e96;
            --text-title: #222222; --text-name: #212529; --table-th-bg: #f8f9fa;
            --table-border: #f1f3f5; --omega-bg: rgba(181, 16, 0, 0.15);
        }
        [data-theme="dark"] {
            --bg-body: #141517; --bg-panel: #1a1b1e; --border-color: #2c2e33;
            --text-main: #c1c2c5; --text-sub: #909296; --text-muted: #5c5f66;
            --text-title: #ffffff; --text-name: #ffe066; --table-th-bg: #25262b;
            --table-border: #2c2e33; --omega-bg: rgba(220, 50, 30, 0.35);
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: sans-serif; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .top-control-bar { width: 100%; max-width: 1400px; display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .btn-toggle-theme { background: var(--bg-panel); color: var(--text-sub); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 50px; cursor: pointer; font-weight: 700; }
        .main-container { display: flex; flex-direction: row; gap: 30px; max-width: 1400px; width: 100%; }
        .podium-wrapper { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 16px; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 20px; padding: 25px; min-height: 500px; }
        .podium-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 18px; padding: 20px; text-align: center; flex: 1; position: relative; overflow: hidden; }
        .rank-panel { flex: 1; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; width: 100%; }
        
        /* 1등 광채 */
        .shine-effect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
        .shine-effect::after { content: ""; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%; background: linear-gradient(135deg, rgba(255,215,0,0) 0%, rgba(255,235,120,0.85) 50%, rgba(255,215,0,0) 100%); animation: diagonalShine 4s ease-in-out infinite; }
        @keyframes diagonalShine { 0% { transform: translate(-30%, -30%); } 18% { transform: translate(30%, 30%); } 100% { transform: translate(30%, 30%); } }

        .omega-row { background-color: var(--omega-bg) !important; }
        .tier-omega-text { color: #b51000; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; border-bottom: 1px solid var(--table-border); text-align: left; }
        .btn-view-stats { background: #eef2ff; color: #4c6ef5; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        @media (max-width: 991px) { .main-container { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="top-control-bar"><button class="btn-toggle-theme" id="theme-toggle-btn" onclick="toggleTheme()">🌙 다크모드</button></div>
    <div class="main-container" id="main-layout">
        <div class="podium-wrapper">
            <div class="podium-card" id="podium-2nd"></div>
            <div class="podium-card" id="podium-1st"></div>
            <div class="podium-card" id="podium-3rd"></div>
        </div>
        <div class="rank-panel">
            <table>
                <thead>
                    <tr><th>순위</th><th>티어</th><th>레벨</th><th>닉네임</th><th style="text-align: right;">전투력</th><th style="text-align: center;">스탯</th></tr>
                </thead>
                <tbody id="ranking-list"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        // 생략된 함수들(toggleTheme, fetchRankingData 등)은 기존 사용하시던 것과 동일하게 유지하시면 됩니다.
        // renderRanking만 아래로 교체하세요.
        function renderRanking() {
            const tbody = document.getElementById('ranking-list');
            tbody.innerHTML = '';
            rankingData.forEach((user, index) => {
                const rank = index + 1;
                const isOmega = rank <= 5;
                const tr = document.createElement('tr');
                if (isOmega) tr.className = 'omega-row';
                tr.innerHTML = `
                    <td>${rank}</td>
                    <td class="tier-omega-text">${isOmega ? 'Ω' : '-'}</td>
                    <td>Lv.${user.level}</td>
                    <td style="color:var(--text-name)">${user.name}</td>
                    <td style="text-align:right">${user.power.toLocaleString()}</td>
                    <td style="text-align:center"><button class="btn-view-stats" onclick="openModal('${user.name}', ${user.level}, ${user.power}, '${user.img}')">📷</button></td>
                `;
                tbody.appendChild(tr);
            });
            updatePodiumSlots();
        }
        
        function updatePodiumSlots() {
            ['podium-1st', 'podium-2nd', 'podium-3rd'].forEach((id, i) => {
                const el = document.getElementById(id);
                if (!rankingData[i]) { el.innerHTML = `<div class="podium-empty">${i+1}등</div>`; return; }
                el.innerHTML = `${i===0 ? '<div class="shine-effect"></div>' : ''}
                    <img src="${['', TROPHY_1ST, TROPHY_2ND, TROPHY_3RD][i+1]}" class="trophy-img" style="height:100px">
                    <div class="podium-name">${rankingData[i].name}</div>
                    <div class="podium-level">Lv.${rankingData[i].level}</div>
                    <div class="podium-power">${rankingData[i].power.toLocaleString()}</div>`;
            });
        }
        
        window.onload = fetchRankingData;
    </script>
</body>
</html>
