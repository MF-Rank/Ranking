<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전투력 랭킹</title>
    <style>
        body {
            background-color: #f8f9fa;
            color: #333333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #222;
        }

        /* 🏛️ 시상대(Podium) 레이아웃 스타일 */
        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 16px;
            max-width: 1000px;
            width: 100%;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .podium-card {
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            padding: 20px 12px;
            text-align: center;
            flex: 1;
            max-width: 220px;
            box-sizing: border-box;
            transition: transform 0.2s;
        }

            .podium-card:hover {
                transform: translateY(-4px);
            }

        .p-1st {
            height: 210px;
            border-top: 5px solid #ffd700;
            background: linear-gradient(180deg, #fffbeb 0%, #ffffff 40%);
        }

        .p-2nd {
            height: 180px;
            border-top: 5px solid #c0c0c0;
        }

        .p-3rd {
            height: 160px;
            border-top: 5px solid #cd7f32;
        }

        .podium-medal {
            font-size: 26px;
            margin-bottom: 8px;
        }

        .podium-name {
            font-weight: 700;
            font-size: 15px;
            color: #212529;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .podium-level {
            font-size: 12px;
            color: #4c6ef5;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .podium-power {
            font-weight: 800;
            font-size: 14px;
            color: #b71c1c;
            margin-bottom: 6px;
        }

        .podium-empty {
            color: #adb5bd;
            font-size: 13px;
            margin-top: 30px;
        }

        .dashboard {
            display: flex;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
            align-items: flex-start;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            padding: 24px;
            box-sizing: border-box;
        }

        .rank-header-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f3f5;
            gap: 15px;
        }

            .rank-header-line .card-title {
                margin: 0;
                font-size: 16px;
                font-weight: 600;
                color: #495057;
                white-space: nowrap;
            }

        .search-input {
            width: 150px !important;
            max-width: 150px !important;
            padding: 6px 10px;
            font-size: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            background-color: #ffffff;
            outline: none;
            box-sizing: border-box;
            text-align: left;
        }

            .search-input:focus {
                border-color: #4c6ef5;
            }

        .rank-panel {
            flex: 1;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #495057;
            font-size: 13px;
            font-weight: 600;
            padding: 12px;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 14px 12px;
            font-size: 14px;
            color: #495057;
            border-bottom: 1px solid #f1f3f5;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
        }

        .top-1 {
            background-color: #fff3bf;
            color: #e67700;
        }

        .top-2 {
            background-color: #e9ecef;
            color: #495057;
        }

        .top-3 {
            background-color: #ffe8cc;
            color: #d9480f;
        }

        .top-normal {
            color: #868e96;
        }

        .level-text {
            color: #4c6ef5;
            font-weight: 600;
            font-size: 13px;
        }

        .power-text {
            font-weight: 700;
            color: #b71c1c;
        }

        .btn-view-stats {
            background: #eef2ff;
            color: #4c6ef5;
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: auto;
            transition: background 0.2s;
        }

            .btn-view-stats:hover {
                background: #dbe4ff;
            }

            .btn-view-stats:disabled {
                background: #f1f3f5;
                color: #adb5bd;
                cursor: not-allowed;
            }

        /* 모달 팝업 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 20px;
            font-weight: bold;
            color: #868e96;
            cursor: pointer;
        }

            .modal-close:hover {
                color: #212529;
            }

        .modal-img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #dee2e6;
        }

        .modal-user-info {
            font-weight: 700;
            font-size: 16px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <img src="https://mblogthumb-phinf.pstatic.net/20140921_272/saiyuki1357_1411272744482CFU6N_GIF/%B0%AD%C7%F53.gif?type=w420"
         alt="강화 연출"
         style="width: 200px; height: auto; margin-bottom: -10px; object-fit: contain;">

    <h1>클래식 서버 전투력 랭킹</h1>

    <div class="podium-container">
        <div class="podium-card p-2nd" id="podium-2nd">
            <div class="podium-medal">🥈</div>
            <div id="p2-content"><div class="podium-empty">2등 공석</div></div>
        </div>
        <div class="podium-card p-1st" id="podium-1st">
            <div class="podium-medal">🥇</div>
            <div id="p1-content"><div class="podium-empty">1등 공석</div></div>
        </div>
        <div class="podium-card p-3rd" id="podium-3rd">
            <div class="podium-medal">🥉</div>
            <div id="p3-content"><div class="podium-empty">3등 공석</div></div>
        </div>
    </div>

    <div class="dashboard">
        <div class="card rank-panel">
            <div class="rank-header-line">
                <h2 class="card-title">📊 실시간 순위표</h2>
                <input type="text" id="search-bar" class="search-input" placeholder="🔍 닉네임 검색" oninput="renderRanking()">
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 10%;">순위</th>
                        <th style="width: 12%;">레벨</th>
                        <th>닉네임</th>
                        <th style="text-align: right; width: 25%;">전투력</th>
                        <th style="text-align: center; width: 20%;">인증</th>
                    </tr>
                </thead>
                <tbody id="ranking-list">
                    <tr><td colspan="5" style="text-align:center; padding:40px 0; color:#adb5bd;">데이터를 불러오는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="img-modal" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-user-info" id="modal-user-title">유저 정보</div>
            <img src="" id="modal-img-src" class="modal-img" alt="전투력 인증 스크린샷">
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1VxePbQvytvB0bkVxDMxukX9VqB15yemmyqNeJ9Ju5eg/edit?gid=1742833314#gid=1742833314";

        let rankingData = [];

        // 💡 [CORS 완벽 우회 포맷] 로컬 바탕화면 환경에서 브라우저 보안 검사를 우회하여 다이렉트로 통과하는 텍스트 스트림 양식
        function getJsonUrl(url) {
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        if (!matches) return null;
        return `https://docs.google.com/spreadsheets/d/${matches[1]}/gviz/tq?tqx=out:csv&gid=1742833314`;
        }

        // CSV 문자열 데이터 분리용 파서 (헤더 및 특수문자 대응)
        function parseCSV(text) {
        if (!text) return [];
        return text.split(/\r?\n/).map(line => {
        const row = [];
        let insideQuote = false;
        let entry = '';
        for (let i = 0; i < line.length; i++) {
        let char = line[i];
        if (char === '"') {
        insideQuote = !insideQuote;
        } else if (char === ',' && !insideQuote) {
        row.push(entry.replace(/^"|"$/g, '').trim());
        entry = '';
        } else {
        entry += char;
        }
        }
        row.push(entry.replace(/^"|"$/g, '').trim());
        return row;
        }).filter(row => row.some(cell => cell !== ""));
        }

        async function fetchRankingData() {
        const jsonUrl = getJsonUrl(GOOGLE_SHEET_URL);
        try {
        const response = await fetch(jsonUrl);
        const text = await response.text();

        const csvRows = parseCSV(text);
        if (csvRows.length === 0) throw new Error("데이터 공백");

        // 💡 첫 행(헤더)을 분석해서 컬럼 위치를 AI 추적 매칭
        const headers = csvRows[0];
        let idxLevel = 1, idxName = 2, idxPower = 3, idxImg = 6, idxApprove = 7;

        headers.forEach((header, index) => {
        const txt = header.toString().replace(/\s+/g, '');
        if (txt.includes('레벨')) idxLevel = index;
        else if (txt.includes('닉네임')) idxName = index;
        else if (txt.includes('전투력')) idxPower = index;
        else if (txt.includes('웹연동')) idxImg = index;
        else if (txt.includes('승인여부')) idxApprove = index;
        });

        const dataMap = new Map();

        // 2번째 행부터 데이터 축적 가동
        for(let i = 1; i < csvRows.length; i++) {
        const cells = csvRows[i];
        if (!cells || cells.length <= Math.max(idxName, idxLevel, idxPower)) continue;

        const name = cells[idxName] ? cells[idxName].trim() : "";
        if (!name) continue;

        
        const rawLevelStr = cells[idxLevel].split('.')[0];
        const level = parseInt(rawLevelStr.replace(/[^0-9]/g, "")) || 0;

        const rawPowerStr = cells[idxPower].split('.')[0];
        const power = parseInt(rawPowerStr.replace(/[^0-9]/g, "")) || 0;
        const img = cells[idxImg] ? cells[idxImg].trim() : "";
        const isApproved = cells[idxApprove] ? cells[idxApprove].trim().toUpperCase() : "";

        if (isApproved === 'Y' || isApproved === '승인') {
        if (!dataMap.has(name) || dataMap.get(name).power < power) {
        dataMap.set(name, { level, name, power, img });
        }
        }
        }

        const fetchedData = Array.from(dataMap.values());
        fetchedData.sort((a, b) => b.power - a.power);
        rankingData = fetchedData;
        renderRanking();

        } catch (error) {
        console.error("데이터 로드 실패:", error);
        document.getElementById('ranking-list').innerHTML = `<tr><td colspan="5" style="text-align:center; color:#fa5252; padding:40px 0;">데이터 연동 실패 (시트 설정 및 주소를 확인해 주세요)</td></tr>`;
        }
        }

        function renderRanking() {
        const tbody = document.getElementById('ranking-list');
        tbody.innerHTML = '';

        updatePodiumSlots();

        const searchTerm = document.getElementById('search-bar').value.trim().toLowerCase();

        if (rankingData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#adb5bd; padding:40px 0;">현재 승인되어 등록된 데이터가 없습니다.</td></tr>`;
        return;
        }

        let hasMatch = false;

        rankingData.forEach((user, index) => {
        const rank = index + 1;

        if (searchTerm && !user.name.toLowerCase().includes(searchTerm)) {
        return;
        }

        hasMatch = true;

        let rankDisplay = `<span class="badge top-normal">${rank}</span>`;
        if (rank === 1) rankDisplay = `<span class="badge top-1">1</span>`;
        else if (rank === 2) rankDisplay = `<span class="badge top-2">2</span>`;
        else if (rank === 3) rankDisplay = `<span class="badge top-3">3</span>`;

        let disabledAttr = user.img ? '' : 'disabled';
        let statsBtnHtml = `<button class="btn-view-stats" ${disabledAttr} onclick="openModal('${user.name}', '${user.level}', '${user.power}', '${user.img}')">📷 스탯보기</button>`;

        const tr = document.createElement('tr');
        tr.innerHTML = `
        <td>${rankDisplay}</td>
        <td class="level-text">Lv.${user.level}</td>
        <td style="font-weight: 600; color:#212529;">${user.name}</td>
        <td class="power-text" style="text-align: right;">${user.power.toLocaleString()}</td>
        <td style="text-align: center;">${statsBtnHtml}</td>
        `;
        tbody.appendChild(tr);
        });

        if (!hasMatch) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#adb5bd; padding:40px 0;">'${searchTerm}' 유저를 찾을 수 없습니다.</td></tr>`;
        }
        }

        function updatePodiumSlots() {
        const fillSlot = (id, user) => {
        const container = document.getElementById(id);
        if (user) {
        let btnHtml = user.img ? `<button class="btn-view-stats" style="margin-top:6px;" onclick="openModal('${user.name}', '${user.level}', '${user.power}', '${user.img}')">📷 스탯보기</button>` : '';
        container.innerHTML = `
        <div class="podium-name">${user.name}</div>
        <div class="podium-level">Lv.${user.level}</div>
        <div class="podium-power">${user.power.toLocaleString()}</div>
        ${btnHtml}
        `;
        } else {
        const num = id.charAt(1);
        container.innerHTML = `<div class="podium-empty">${num}등 공석</div>`;
        }
        };

        fillSlot('p1-content', rankingData[0]);
        fillSlot('p2-content', rankingData[1]);
        fillSlot('p3-content', rankingData[2]);
        }

        function openModal(name, level, power, imgUrl) {
        if (!imgUrl) return;
        document.getElementById('modal-user-title').innerText = `[Lv.${level}] ${name} 님의 스텟 인증`;
        document.getElementById('modal-img-src').src = imgUrl;
        document.getElementById('img-modal').style.display = 'flex';
        }

        function closeModal() {
        document.getElementById('img-modal').style.display = 'none';
        document.getElementById('modal-img-src').src = '';
        }

        window.onload = function() {
        fetchRankingData();
        };
    </script>
</body>
</html>
