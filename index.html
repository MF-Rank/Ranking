<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전투력 랭킹</title>
    <style>
        body {
            background-color: #f8f9fa;
            color: #333333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #222;
        }

        /* 🏛️ 시상대(Podium) 레이아웃 스타일 */
        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 16px;
            max-width: 1000px;
            width: 100%;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .podium-card {
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            padding: 20px 12px;
            text-align: center;
            flex: 1;
            max-width: 220px;
            box-sizing: border-box;
            transition: transform 0.2s;
        }

            .podium-card:hover {
                transform: translateY(-4px);
            }

        .p-1st {
            height: 210px;
            border-top: 5px solid #ffd700;
            background: linear-gradient(180deg, #fffbeb 0%, #ffffff 40%);
        }

        .p-2nd {
            height: 180px;
            border-top: 5px solid #c0c0c0;
        }

        .p-3rd {
            height: 160px;
            border-top: 5px solid #cd7f32;
        }

        .podium-medal {
            font-size: 26px;
            margin-bottom: 8px;
        }

        .podium-name {
            font-weight: 700;
            font-size: 15px;
            color: #212529;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .podium-level {
            font-size: 12px;
            color: #4c6ef5;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .podium-power {
            font-weight: 800;
            font-size: 14px;
            color: #b71c1c;
            margin-bottom: 6px;
        }

        .podium-empty {
            color: #adb5bd;
            font-size: 13px;
            margin-top: 30px;
        }

        .dashboard {
            display: flex;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
            align-items: flex-start;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            padding: 24px;
            box-sizing: border-box;
        }

        /* 관리자 입력 패널 */
        .input-panel {
            flex: 0.8;
            max-width: 320px;
            position: sticky;
            top: 20px;
            display: none;
        }

        /* 📊 순위표 헤더 라인 */
        .rank-header-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f3f5;
        }

            .rank-header-line .card-title {
                margin: 0;
                font-size: 16px;
                font-weight: 600;
                color: #495057;
            }

        
        .search-input {
            display: block;
            width: 150px !important; 
            max-width: 150px !important; 
            padding: 6px 10px;
            font-size: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            background-color: #ffffff;
            outline: none;
            box-sizing: border-box;
            text-align: left;
        }

            .search-input:focus {
                border-color: #4c6ef5;
            }

        .input-panel .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #495057;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f3f5;
        }

        .form-group {
            margin-bottom: 16px;
        }

            .form-group label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: #868e96;
                margin-bottom: 6px;
            }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            font-size: 13px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            background-color: #fff;
            color: #495057;
            outline: none;
            box-sizing: border-box;
        }

            input[type="number"]:focus, input[type="text"]:focus {
                border-color: #4c6ef5;
            }

        button {
            width: 100%;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit {
            background-color: #4c6ef5;
            color: #ffffff;
            margin-top: 10px;
        }

            .btn-submit:hover {
                background-color: #3b5bdb;
            }

        .btn-reset {
            background-color: #f1f3f5;
            color: #fa5252;
            margin-top: 8px;
        }

            .btn-reset:hover {
                background-color: #e9ecef;
            }

        .rank-panel {
            flex: 2;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #495057;
            font-size: 13px;
            font-weight: 600;
            padding: 12px;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 14px 12px;
            font-size: 14px;
            color: #495057;
            border-bottom: 1px solid #f1f3f5;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
        }

        .top-1 {
            background-color: #fff3bf;
            color: #e67700;
        }

        .top-2 {
            background-color: #e9ecef;
            color: #495057;
        }

        .top-3 {
            background-color: #ffe8cc;
            color: #d9480f;
        }

        .top-normal {
            color: #868e96;
        }

        .level-text {
            color: #4c6ef5;
            font-weight: 600;
            font-size: 13px;
        }

        .power-text {
            font-weight: 700;
            color: #b71c1c;
        }

        .btn-view-stats {
            background: #eef2ff;
            color: #4c6ef5;
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: auto;
            transition: background 0.2s;
        }

            .btn-view-stats:hover {
                background: #dbe4ff;
            }

            .btn-view-stats:disabled {
                background: #f1f3f5;
                color: #adb5bd;
                cursor: not-allowed;
            }

        .admin-col {
            display: none;
        }

        .btn-del {
            background: none;
            border: none;
            color: #adb5bd;
            cursor: pointer;
            padding: 4px;
            font-size: 12px;
            width: auto;
        }

            .btn-del:hover {
                color: #fa5252;
            }

        /* 모달 팝업 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 20px;
            font-weight: bold;
            color: #868e96;
            cursor: pointer;
        }

            .modal-close:hover {
                color: #212529;
            }

        .modal-img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #dee2e6;
        }

        .modal-user-info {
            font-weight: 700;
            font-size: 16px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- 메인 연출 GIF 및 타이틀 -->
    <img src="https://mblogthumb-phinf.pstatic.net/20140921_272/saiyuki1357_1411272744482CFU6N_GIF/%B0%AD%C7%F53.gif?type=w420"
         alt="강화 연출"
         style="width: 500px; height: auto; margin-bottom: -10px; object-fit: contain;">

    <h1>클래식 서버 전투력 랭킹</h1>

    <!-- 🏛️ 시상대(Podium) 영역 -->
    <div class="podium-container">
        <div class="podium-card p-2nd" id="podium-2nd">
            <div class="podium-medal">🥈</div>
            <div id="p2-content"><div class="podium-empty">2등 공석</div></div>
        </div>
        <div class="podium-card p-1st" id="podium-1st">
            <div class="podium-medal">🥇</div>
            <div id="p1-content"><div class="podium-empty">1등 공석</div></div>
        </div>
        <div class="podium-card p-3rd" id="podium-3rd">
            <div class="podium-medal">🥉</div>
            <div id="p3-content"><div class="podium-empty">3등 공석</div></div>
        </div>
    </div>

    <div class="dashboard">
        <!-- 왼쪽: 관리자용 입력 패널 -->
        <div class="card input-panel" id="admin-input-card">
            <h2 class="card-title">📝 데이터 수동 입력</h2>

            <div class="form-group">
                <label>레벨</label>
                <input type="number" id="userlevel" placeholder="예: 120">
            </div>

            <div class="form-group">
                <label>유저 닉네임</label>
                <input type="text" id="username" placeholder="닉네임 입력">
            </div>

            <div class="form-group">
                <label>전투력</label>
                <input type="number" id="combat-power" placeholder="숫자만 입력 (예: 154000)">
            </div>

            <div class="form-group">
                <label>스크린샷 이미지 경로 또는 링크 (선택)</label>
                <input type="text" id="userimg" placeholder="예: img/user1.png 또는 이미지 주소 url">
            </div>

            <button class="btn-submit" onclick="addRanking()">랭킹 등록</button>
            <button class="btn-reset" onclick="resetRanking()">전체 초기화</button>
        </div>

        <!-- 오른쪽: 실시간 순위표 -->
        <div class="card rank-panel">
            <div class="rank-header-line">
                <h2 class="card-title">📊 실시간 순위표</h2>
                <!-- 🔍 무조건 150px 크기로 작고 고정되게 세팅함 -->
                <input type="text" id="search-bar" class="search-input" placeholder="🔍 닉네임 검색" oninput="renderRanking()">
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 10%;">순위</th>
                        <th style="width: 12%;">레벨</th>
                        <th>닉네임</th>
                        <th style="text-align: right; width: 22%;">전투력</th>
                        <th style="text-align: center; width: 18%;">인증</th>
                        <th class="admin-col" style="width: 12%; text-align: center;">관리</th>
                    </tr>
                </thead>
                <tbody id="ranking-list">
                    <!-- 스크립트로 데이터 주입 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 이미지 팝업 모달창 -->
    <div class="modal-overlay" id="img-modal" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-user-info" id="modal-user-title">유저 정보</div>
            <img src="" id="modal-img-src" class="modal-img" alt="전투력 인증 스크린샷">
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD_HASH = "65E65D2DC480DA70337A1F7214BBA4C63013E6166906510B9DBA89CB6FE47ACE";

        const urlParams = new URLSearchParams(window.location.search);
        const isAdminMode = urlParams.get('admin') === 'true';
        let isAuthorized = false;

        let rankingData = JSON.parse(localStorage.getItem('manual_combat_rankings')) || [];

        async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function renderRanking() {
        const tbody = document.getElementById('ranking-list');
        tbody.innerHTML = '';

        rankingData.sort((a, b) => b.power - a.power);
        updatePodiumSlots();

        const searchTerm = document.getElementById('search-bar').value.trim().toLowerCase();

        if (rankingData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${isAuthorized ? 6 : 5}" style="text-align:center; color:#adb5bd; padding:40px 0;">등록된 데이터가 없습니다.</td></tr>`;
        return;
        }

        let hasMatch = false;

        rankingData.forEach((user, index) => {
        const rank = index + 1;

        if (searchTerm && !user.name.toLowerCase().includes(searchTerm)) {
        return;
        }

        hasMatch = true;

        let rankDisplay = `<span class="badge top-normal">${rank}</span>`;
        if (rank === 1) rankDisplay = `<span class="badge top-1">1</span>`;
        else if (rank === 2) rankDisplay = `<span class="badge top-2">2</span>`;
        else if (rank === 3) rankDisplay = `<span class="badge top-3">3</span>`;

        const tr = document.createElement('tr');

        if (isAuthorized) {
        tr.style.cursor = "pointer";
        tr.title = "클릭하면 이 유저의 정보를 수정할 수 있습니다.";
        tr.onclick = () => editUser(user.name, user.level, user.power, user.img || '');
        }

        let disabledAttr = user.img ? '' : 'disabled';
        let statsBtnHtml = `<button class="btn-view-stats" ${disabledAttr} onclick="event.stopPropagation(); openModal('${user.name}', '${user.level}', '${user.power}', '${user.img}')">📷 스탯보기</button>`;

        let adminTd = isAuthorized ? `<td class="admin-col" style="text-align: center; display:table-cell;"><button class="btn-del" onclick="event.stopPropagation(); deleteUserByName('${user.name}');">삭제</button></td>` : '';

        tr.innerHTML = `
        <td>${rankDisplay}</td>
        <td class="level-text">Lv.${user.level}</td>
        <td style="font-weight: 600; color:#212529;">${user.name}</td>
        <td class="power-text" style="text-align: right;">${user.power.toLocaleString()}</td>
        <td style="text-align: center;">${statsBtnHtml}</td>
        ${adminTd}
        `;
        tbody.appendChild(tr);
        });

        if (!hasMatch) {
        tbody.innerHTML = `<tr><td colspan="${isAuthorized ? 6 : 5}" style="text-align:center; color:#adb5bd; padding:40px 0;">'${searchTerm}' 유저를 찾을 수 없습니다.</td></tr>`;
        }

        localStorage.setItem('manual_combat_rankings', JSON.stringify(rankingData));
        }

        function updatePodiumSlots() {
        const fillSlot = (id, user) => {
        const container = document.getElementById(id);
        if (user) {
        let btnHtml = user.img ? `<button class="btn-view-stats" style="margin-top:6px;" onclick="event.stopPropagation(); openModal('${user.name}', '${user.level}', '${user.power}', '${user.img}')">📷 스탯보기</button>` : '';
        container.innerHTML = `
        <div class="podium-name">${user.name}</div>
        <div class="podium-level">Lv.${user.level}</div>
        <div class="podium-power">${user.power.toLocaleString()}</div>
        ${btnHtml}
        `;
        if (isAuthorized) {
        container.parentElement.onclick = () => editUser(user.name, user.level, user.power, user.img || '');
        container.parentElement.style.cursor = "pointer";
        }
        } else {
        const num = id.charAt(1);
        container.innerHTML = `<div class="podium-empty">${num}등 공석</div>`;
        container.parentElement.onclick = null;
        container.parentElement.style.cursor = "default";
        }
        };

        fillSlot('p1-content', rankingData[0]);
        fillSlot('p2-content', rankingData[1]);
        fillSlot('p3-content', rankingData[2]);
        }

        function addRanking() {
        const levelInput = document.getElementById('userlevel');
        const nameInput = document.getElementById('username');
        const powerInput = document.getElementById('combat-power');
        const imgInput = document.getElementById('userimg');

        const level = levelInput.value.trim();
        const name = nameInput.value.trim();
        const power = parseInt(powerInput.value);
        const img = imgInput.value.trim();

        if (!level || !name || isNaN(power)) {
        alert("모든 빈칸을 바르게 입력해 주세요.");
        return;
        }

        const existingIndex = rankingData.findIndex(user => user.name === name);

        if (existingIndex !== -1) {
        rankingData[existingIndex].level = level;
        rankingData[existingIndex].power = power;
        rankingData[existingIndex].img = img;
        alert(`[${name}] 유저의 정보가 수정되었습니다.`);
        } else {
        rankingData.push({ level: level, name: name, power: power, img: img });
        }

        levelInput.value = '';
        nameInput.value = '';
        powerInput.value = '';
        imgInput.value = '';

        document.getElementById('search-bar').value = '';
        renderRanking();
        }

        function editUser(name, level, power, img) {
        document.getElementById('username').value = name;
        document.getElementById('userlevel').value = level;
        document.getElementById('combat-power').value = power;
        document.getElementById('userimg').value = img;
        document.getElementById('userlevel').focus();
        }

        function deleteUserByName(name) {
        if(confirm(`[${name}] 유저를 랭킹에서 삭제할까요?`)) {
        rankingData = rankingData.filter(user => user.name !== name);
        renderRanking();
        }
        }

        function resetRanking() {
        if(confirm("모든 데이터를 삭제하시겠습니까?")) {
        rankingData = [];
        document.getElementById('search-bar').value = '';
        renderRanking();
        }
        }

        function openModal(name, level, power, imgUrl) {
        if (!imgUrl) return;
        document.getElementById('modal-user-title').innerText = `[Lv.${level}] ${name} 님의 스텟 인증`;
        document.getElementById('modal-img-src').src = imgUrl;
        document.getElementById('img-modal').style.display = 'flex';
        }

        function closeModal() {
        document.getElementById('img-modal').style.display = 'none';
        document.getElementById('modal-img-src').src = '';
        }

        window.onload = async function() {
        if (isAdminMode) {
        const inputPw = prompt("관리자 비밀번호를 입력해 주세요:");
        if (!inputPw) {
        window.location.href = window.location.pathname;
        return;
        }

        const inputHash = await sha256(inputPw);

        if (inputHash.toUpperCase() === ADMIN_PASSWORD_HASH.toUpperCase()) {
        isAuthorized = true;
        document.getElementById('admin-input-card').style.display = 'block';
        document.querySelectorAll('.admin-col').forEach(el => el.style.display = 'table-cell');
        } else {
        alert("비밀번호가 일치하지 않습니다. 일반 보기 모드로 진입합니다.");
        window.location.href = window.location.pathname;
        return;
        }
        }
        renderRanking();
        };
    </script>
</body>
</html>
